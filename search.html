<!doctype html><html><head><link rel='stylesheet' href='assets/css/style.css'></head><body><main><h1>Recherche</h1><input id='q' placeholder='Rechercher un produit'><ul id='r'></ul><script>const p=['Caméra IP 4MP','NVR 8 canaux','Alarme'];q.oninput=()=>{r.innerHTML='';p.filter(x=>x.toLowerCase().includes(q.value.toLowerCase())).forEach(x=>r.innerHTML+=`<li>${x}</li>`);}</script></main></body></html>
